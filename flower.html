<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>🌸 화분관리현황</title>
<meta name="theme-color" content="#D98A1F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="화분관리현황">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" id="favicon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23D98A1F'/%3E%3Cg fill='%23fff'%3E%3Cellipse cx='12' cy='6' rx='2.2' ry='3.3'/%3E%3Cellipse cx='12' cy='18' rx='2.2' ry='3.3'/%3E%3Cellipse cx='6' cy='12' rx='3.3' ry='2.2'/%3E%3Cellipse cx='18' cy='12' rx='3.3' ry='2.2'/%3E%3C/g%3E%3Ccircle cx='12' cy='12' r='3' fill='%23FFE6A3'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" id="touchicon" href="">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="app-root"><div class="loading">불러오는 중…</div></div>

<style>
  :root{
    --bg:#FBF7EF;--card:#FFFFFF;--ink:#241B12;--muted:#857967;
    --honey:#D98A1F;--honey-deep:#A9650F;--honey-soft:#FBEEDA;
    --leaf:#3F7A4F;--leaf-soft:#E6F0E7;--leaf-deep:#2A5234;
    --clay:#A8551F;--clay-soft:#F4E4D6;
    --dry:#7A6433;--dry-soft:#EBDFC4;--dry-deep:#5E4E2A;
    --mix:#3E6E8E;--mix-soft:#E2EDF3;--mix-deep:#2C5168;
    --amber:#B57C10;--amber-soft:#FBF0D5;
    --red:#A8362A;--red-soft:#F7E5E2;
    --line:#E9DFCD;--line-soft:#F3ECDD;--radius:16px;--maxw:480px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  #app-root{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;color:var(--ink);background:var(--bg);max-width:var(--maxw);margin:0 auto;min-height:100vh;position:relative;padding-bottom:86px;font-feature-settings:"tnum";}
  .loading{padding:60px 20px;text-align:center;color:var(--muted);font-size:15px;}

  .topbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:13px 16px 10px;}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
  .brand .dot{width:28px;height:28px;border-radius:8px;background:linear-gradient(150deg,var(--honey),var(--honey-deep));display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .brand .dot svg{width:16px;height:16px;}
  .brand .bt{flex:1;min-width:0;}
  .brand h1{font-size:17px;font-weight:800;letter-spacing:-.4px;margin:0;}
  .brand small{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-top:1px;}
  .authbtn{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:800;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:5px;}
  .authbtn svg{width:13px;height:13px;}
  .authbtn.on{background:var(--leaf-soft);border-color:var(--leaf);color:var(--leaf-deep);}

  .hero{background:linear-gradient(155deg,var(--honey) 0%,var(--honey-deep) 100%);border-radius:var(--radius);padding:17px 18px 16px;color:#fff;box-shadow:0 8px 22px -10px rgba(169,101,15,.55);}
  .herowrap{display:flex;gap:10px;}
  .herocard{flex:1;min-width:0;border-radius:var(--radius);padding:15px 14px 13px;color:#fff;}
  .herocard.fresh{background:linear-gradient(155deg,#E59A2A 0%,#B5701A 100%);box-shadow:0 8px 20px -11px rgba(169,101,15,.6);}
  .herocard.dry{background:linear-gradient(155deg,#8C7A4A 0%,#5E4E2A 100%);box-shadow:0 8px 20px -11px rgba(70,56,28,.55);}
  .herocard .lbl{font-size:12.5px;font-weight:800;opacity:.95;white-space:nowrap;}
  .herocard .big{font-size:30px;font-weight:800;letter-spacing:-1.2px;line-height:1.05;margin:5px 0 1px;}
  .herocard .big .u{font-size:14px;font-weight:800;margin-left:3px;opacity:.92;}
  .herocard .box{font-size:11.5px;opacity:.9;font-weight:700;}
  .row2{display:flex;gap:10px;margin-top:10px;}
  .ministat{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;border-left-width:4px;}
  .ministat.fresh{border-left-color:var(--honey);}
  .ministat.dry{border-left-color:#7A6433;}
  .ministat .k{font-size:12.5px;color:var(--muted);font-weight:700;}
  .ministat .v{font-size:17px;font-weight:800;letter-spacing:-.4px;margin-top:2px;}
  .boxnote{text-align:center;font-size:13px;color:var(--muted);font-weight:700;margin-top:9px;}
  .seg.matseg{margin:8px 0 4px;}
  .seg.matseg button[data-mv="dry"].on{background:#EBDFC4;border-color:#9A8246;color:#5E4E2A;}
  .seg.matseg button[data-mv="fresh"].on{background:var(--honey-soft);border-color:var(--honey);color:var(--honey-deep);}
  .seg.matseg button[data-mv="all"].on{background:var(--ink);border-color:var(--ink);color:#fff;}
  /* 사용 카드형 선택기 */
  .lotpick{margin-top:8px;max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:2px;}
  .pickcard{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:12px 13px;cursor:pointer;transition:.12s;}
  .pickcard:active{transform:scale(.99);}
  .pickcard.sel{border-color:var(--honey);background:var(--honey-soft);box-shadow:0 0 0 3px rgba(217,138,31,.15);}
  .pickcard .pl{flex:1;min-width:0;}
  .pickcard .pname{font-size:15px;font-weight:800;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;}
  .pickcard .psub{font-size:13.5px;color:var(--muted);font-weight:700;margin-top:3px;}
  .pickcard .pr{flex:0 0 auto;text-align:right;}
  .pickcard .prem{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--honey-deep);line-height:1;}
  .pickcard .prem span{font-size:10px;font-weight:800;color:var(--muted);margin-left:1px;}
  .pickcard .pchk{font-size:11px;font-weight:800;color:var(--honey-deep);margin-top:4px;}
  .pickempty{text-align:center;color:var(--muted);font-size:13px;padding:22px;font-weight:600;}
  .reqmark{font-size:11px;color:var(--honey-deep);font-weight:700;}
  .sourcebtn{width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;}
  .sourcebtn.picked{border-color:var(--honey);background:var(--honey-soft);color:var(--honey-deep);}
  .sourcebtn:disabled{opacity:.55;cursor:default;}
  .pickerwrap{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;margin-top:6px;padding:2px;}

  .strip{display:flex;gap:7px;overflow-x:auto;padding:11px 2px 2px;margin:0 -2px;}
  .strip::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 13px;}
  .pill.alert{background:var(--red-soft);border-color:#e7c4be;}
  .pill .pk{font-size:12px;color:var(--muted);font-weight:700;}
  .pill.alert .pk{color:var(--red);}
  .pill .pv{font-size:15px;font-weight:800;letter-spacing:-.3px;margin-top:1px;}
  .pill.alert .pv{color:var(--red);}

  .panel{display:none;padding:4px 14px 14px;}
  .panel.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .section-h{font-size:12px;font-weight:800;color:var(--muted);margin:16px 4px 8px;}

  .filters{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 4px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:13.5px;font-weight:700;padding:6px 13px;border-radius:999px;cursor:pointer;transition:.15s;}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .yearfilters .chip.on{background:var(--mix);border-color:var(--mix);color:#fff;}
  .search{width:100%;margin:8px 0 2px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;font-size:14.5px;background:var(--card);color:var(--ink);}
  .search::placeholder{color:#b9ad99;}

  /* 재고 그룹 — 열 정렬 */
  .group{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:11px;overflow:hidden;}
  .group.dry{border-color:#cdb887;background:#EADBBA;}
  .group.dry .grem{color:#5E4A1E;}
  .group.dry .lots{background:#E3D2AC;}
  .group.depleted{opacity:.62;}
  .group.depleted .grem{color:var(--muted);}
  .lot.done .ldate,.lot.done .lnums,.lot.done .lnums b,.lot.done .lnums .rem b{color:#a99c87;}
  .lot.done .lstat{background:#ece4d6;color:#a99c87;}
  .lot.done .bar i{background:#cdbfa6;}
  #kind-seg button[data-k="dry"].on{background:var(--dry-soft);border-color:var(--dry);color:var(--dry-deep);}
  #kind-seg button[data-k="fresh"].on{background:var(--honey-soft);border-color:var(--honey);color:var(--honey-deep);}
  .ghead{display:flex;align-items:center;gap:8px;padding:14px 14px;cursor:pointer;}
  .ghead .gl{flex:1;min-width:0;}
  .ghead .gname{font-size:16px;font-weight:800;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;}
  .tagdot{font-size:11.5px;font-weight:800;padding:2px 7px;border-radius:999px;flex:0 0 auto;}
  .tagdot.fresh{background:var(--honey-soft);color:var(--honey-deep);}
  .tagdot.dryt{background:var(--dry-soft);color:var(--dry-deep);}
  .ghead .gtype{font-size:13px;color:var(--muted);font-weight:700;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ghead .gr{flex:0 0 112px;text-align:right;}
  .ghead .grem{font-size:23px;font-weight:800;letter-spacing:-.7px;line-height:1;}
  .ghead .grem.neg{color:var(--red);}
  .ghead .grem .u{font-size:11px;font-weight:800;margin-left:2px;color:var(--muted);}
  .ghead .gsub{font-size:12.5px;color:var(--muted);font-weight:700;margin-top:4px;}
  .caret{flex:0 0 auto;transition:.2s;color:#c3b8a4;}
  .group.open .caret{transform:rotate(180deg);}
  .lots{display:none;border-top:1px solid var(--line-soft);padding:2px 14px 8px;background:#FDFBF6;}
  .group.open .lots{display:block;}
  .lot{padding:11px 0;border-bottom:1px solid var(--line-soft);}
  .lot:last-child{border-bottom:none;}
  .lot .ltop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .lot .ldate{font-size:14.5px;font-weight:800;letter-spacing:-.3px;}
  .lstat{font-size:12.5px;font-weight:800;padding:3px 9px;border-radius:999px;flex:0 0 auto;}
  .st-full{background:var(--leaf-soft);color:var(--leaf);}
  .st-low{background:var(--amber-soft);color:var(--amber);}
  .st-zero{background:var(--red-soft);color:var(--red);}
  .lot .lnums{display:flex;margin-top:7px;font-size:13.5px;color:var(--muted);}
  .lot .lnums>span{flex:1;}
  .lot .lnums>span:last-child{flex:0 0 96px;text-align:right;}
  .lot .lnums b{color:var(--ink);font-weight:800;font-size:14.5px;}
  .lot .lnums .rem b{color:var(--honey-deep);}
  .lot .lnums .disp b{color:#9a3b2f;}
  .bar{height:7px;border-radius:999px;background:var(--line);margin-top:9px;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:999px;background:var(--honey);}
  .bar.b-zero i{background:#d8b89a;}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:34px 20px;line-height:1.7;}

  /* 폼 */
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:13px;font-weight:800;margin:0 2px 6px;color:#4a4031;}
  .field input,.field select,.field textarea{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:16px;font-weight:600;background:var(--card);color:var(--ink);font-family:inherit;}
  .field textarea{resize:vertical;min-height:46px;font-weight:500;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--honey);box-shadow:0 0 0 3px var(--honey-soft);}
  .seg{display:flex;gap:6px;margin-bottom:13px;}
  #mode-seg{flex-wrap:wrap;}
  #mode-seg button{flex:1 1 40%;font-size:13px;padding:11px 6px;}
  .seg button{flex:1;padding:10px;border:1px solid var(--line);background:var(--card);border-radius:10px;font-size:13.5px;font-weight:800;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--honey-soft);border-color:var(--honey);color:var(--honey-deep);}
  #mode-seg button[data-m="fresh"].on{background:var(--honey-soft);border-color:var(--honey);color:var(--honey-deep);}
  #mode-seg button[data-m="dry"].on{background:var(--dry-soft);border-color:var(--dry);color:var(--dry-deep);}
  #mode-seg button[data-m="total"].on{background:var(--mix-soft);border-color:var(--mix);color:var(--mix-deep);}
  #mode-seg button[data-m="amount"].on{background:#EAE4F0;border-color:#8A6FB0;color:#5B4380;}
  .rchips{display:flex;gap:6px;flex-wrap:wrap;}
  .rchip{border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:13.5px;font-weight:800;padding:9px 15px;border-radius:10px;cursor:pointer;}
  .rchip.on{background:var(--leaf-soft);border-color:var(--leaf);color:var(--leaf-deep);}
  .rchip.bad.on{background:var(--red-soft);border-color:var(--red);color:var(--red);}
  .hint{font-size:12px;color:var(--muted);margin:6px 2px 0;font-weight:600;line-height:1.5;}
  .err{font-size:12.5px;color:var(--red);margin:7px 2px 0;font-weight:700;display:none;}
  .err.show{display:block;}
  .submit{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(150deg,var(--honey),var(--honey-deep));cursor:pointer;margin-top:4px;letter-spacing:-.3px;box-shadow:0 6px 16px -8px rgba(169,101,15,.6);}
  .submit.ghost{background:#fff;color:#9a3b2f;border:1.6px solid #e2b3aa;box-shadow:none;}
  .submit:active{transform:translateY(1px);}
  .submit.use{background:linear-gradient(150deg,#5a8a64,var(--leaf));box-shadow:0 6px 16px -8px rgba(63,122,79,.6);}
  .formcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .needlogin{background:var(--honey-soft);border-radius:11px;padding:11px 13px;font-size:12.5px;font-weight:700;color:var(--honey-deep);margin-bottom:14px;line-height:1.6;}
  .linklike{border:none;background:var(--honey-deep);color:#fff;font-size:12px;font-weight:800;padding:5px 11px;border-radius:8px;cursor:pointer;}
  .formcard.locked input,.formcard.locked select,.formcard.locked textarea,.formcard.locked .seg button{background:#F4EEE3;color:#a99c87;}
  .preview{background:var(--honey-soft);border-radius:13px;padding:15px 16px;margin-bottom:13px;transition:.15s;border:1.5px solid transparent;}
  .preview .pmain{font-size:18px;font-weight:800;color:var(--honey-deep);letter-spacing:-.3px;line-height:1.35;}
  .preview .psub{font-size:15px;color:#946823;margin-top:7px;font-weight:700;line-height:1.55;}
  .preview .psub b{font-size:16px;}
  .preview.m-amount{background:#EFEAF5;border-color:#8A6FB0;} .preview.m-amount .pmain{color:#5B4380;} .preview.m-amount .psub{color:#6b5790;}
  .preview.m-fresh{background:var(--honey-soft);border-color:var(--honey);} .preview.m-fresh .pmain{color:var(--honey-deep);} .preview.m-fresh .psub{color:#946823;}
  .preview.m-dry{background:var(--dry-soft);border-color:var(--dry);} .preview.m-dry .pmain{color:var(--dry-deep);} .preview.m-dry .psub{color:#6b5a30;}
  .preview.m-total{background:var(--mix-soft);border-color:var(--mix);} .preview.m-total .pmain{color:var(--mix-deep);} .preview.m-total .psub{color:#3a607a;}
  .preview .warn{color:var(--red);}
  .lock-note{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:18px;text-align:center;color:var(--muted);font-size:13.5px;font-weight:600;line-height:1.7;}

  /* 이력 */
  .datehead{font-size:16.5px;font-weight:800;letter-spacing:-.4px;margin:18px 4px 9px;display:flex;align-items:baseline;gap:7px;}
  .datehead .wd{font-size:13.5px;font-weight:800;color:var(--muted);}
  .hitem{display:flex;align-items:flex-start;gap:11px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:8px;}
  .hitem.in{border-left-color:var(--honey);}
  .hitem.dryin{border-left-color:var(--dry);}
  .hitem.out{border-left-color:var(--leaf);}
  .hitem.disp{border-left-color:#c0503f;}
  .hitem.tap{cursor:pointer;}
  .hitem.overdue{border-color:#e7c4be;border-left-color:#d98a1f;background:#fdf4f2;}
  .htag{flex:0 0 auto;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;text-align:center;line-height:1.15;}
  .htag.in{background:var(--honey-soft);color:var(--honey-deep);}
  .htag.dryin{background:var(--dry-soft);color:var(--dry-deep);}
  .htag.out{background:var(--leaf-soft);color:var(--leaf);}
  .htag.disp{background:#f3dcd7;color:#9a3b2f;}
  .hbody{flex:1;min-width:0;}
  .hbody .h1{font-size:16px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hbody .h2{font-size:13.5px;color:var(--muted);margin-top:4px;font-weight:700;}
  .hbody .h-src{font-size:14.5px;margin-top:5px;font-weight:700;color:#7a6f60;line-height:1.4;}
  .hbody .h-src .rsrc{color:var(--mix-deep);font-weight:800;}
  .hbody .h-mix{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .hbody .h-mix .mb{font-size:13px;font-weight:800;padding:3px 9px;border-radius:8px;white-space:nowrap;}
  .hbody .h-mix .mb.fresh{background:var(--honey-soft);color:var(--honey-deep);}
  .hbody .h-mix .mb.dry{background:var(--dry-soft);color:var(--dry-deep);}
  .hbody .h-mix .mb.ratio{background:var(--mix-soft);color:var(--mix-deep);}
  .hbody .h-memo{font-size:13.5px;margin-top:6px;font-weight:600;color:#6b6256;border-left:3px solid var(--line);padding:2px 0 2px 9px;line-height:1.45;}
  .hbody .h3{font-size:14px;margin-top:6px;font-weight:800;}
  .res-양호{color:var(--leaf);} .res-보통{color:var(--amber);} .res-불량{color:var(--red);} .res-관찰중{color:var(--clay);}
  .rbtn{display:inline-block;margin-top:7px;border:1px solid var(--leaf);background:var(--leaf-soft);color:var(--leaf-deep);font-size:12px;font-weight:800;padding:6px 12px;border-radius:9px;cursor:pointer;}
  .rbtn.due{border-color:var(--red);background:var(--red-soft);color:var(--red);}
  .rbtn.muted{border-color:var(--line);background:#ececec;color:var(--muted);cursor:default;}
  .hright{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .hqty{font-size:14.5px;font-weight:800;letter-spacing:-.3px;}
  .hqty.in{color:var(--honey-deep);} .hqty.dryin{color:var(--dry-deep);} .hqty.out{color:var(--leaf);} .hqty.disp{color:#9a3b2f;}
  .hdel{width:26px;height:26px;border:none;background:transparent;color:#c9bca6;font-size:18px;cursor:pointer;border-radius:7px;}
  .hdel:active{background:var(--red-soft);color:var(--red);}

  .mbtns .save{flex:2;padding:15px;border:none;border-radius:13px;background:linear-gradient(150deg,var(--honey),var(--honey-deep));color:#fff;font-size:15px;font-weight:800;cursor:pointer;}
  .mbtns .cancel{flex:1;padding:15px;border:1px solid var(--line);border-radius:13px;background:var(--card);color:var(--muted);font-size:14px;font-weight:800;cursor:pointer;}
  .mdel{width:100%;margin-top:10px;padding:12px;border:1px solid #e7c4be;border-radius:12px;background:var(--red-soft);color:var(--red);font-size:13px;font-weight:800;cursor:pointer;}

  .toast{position:fixed;left:50%;bottom:98px;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;padding:12px 19px;border-radius:999px;font-size:13.5px;font-weight:700;opacity:0;transition:.28s;z-index:70;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

<script>
(function(){
  const BOX_KG=20, DUE_DAYS=30;
  const FRESH_TYPES=["생화분(도토리)","생화분(유채_중국)","생화분(유채)","생화분(잡화)"];
  const DRY_TYPES=["건조화분(유채)","건조화분(잡화)"];
  const PLACES=["산란실","사육실"];
  const RATIOS=[100,50,40,35,30,0];

  /* ===========================================================
     ▼▼▼ Firebase 설정 (직원 공유용) ▼▼▼
     firebase 콘솔에서 웹앱 추가 후 받은 firebaseConfig 값을 여기에 붙여넣으세요.
     값을 넣으면 모든 직원이 같은 데이터를 실시간 공유합니다.
     비워두면(YOUR_ 그대로면) 이 기기에만 저장됩니다.
  =========================================================== */
  const FIREBASE_CONFIG={
    apiKey:"AIzaSyB2c0FEzPo2QA4S4LmF_9u6_XvkQ25ivb8",
    authDomain:"flower-6b55e.firebaseapp.com",
    projectId:"flower-6b55e",
    storageBucket:"flower-6b55e.firebasestorage.app",
    messagingSenderId:"395953668835",
    appId:"1:395953668835:web:66961ec9249ea1b1663bd6"
  };
  /* ▲▲▲ 여기까지만 수정하면 됩니다 ▲▲▲ */
  const FB_READY=(typeof firebase!=='undefined')&&!!FIREBASE_CONFIG.projectId&&FIREBASE_CONFIG.projectId.indexOf('YOUR_')<0;

  let state={lots:[],batches:[],disposals:[]};
  let auth={h:null,v:2};
  let isAdmin=false;
  let ui={tab:'inv',matView:'all',typeFilter:'전체',search:'',openRegions:{},histFilter:'전체',histYear:'전체',usedYear:'전체',showOld:false,
          inboundKind:'fresh',inboundUnit:'kg',ratioMode:'dry',edit:null,modalResult:''};

  const DKEY='pollen_data_v3', AKEY='pollen_auth_v3', SKEY='pollen_session_v3';
  const Store={
    async get(k,shared){try{if(window.storage){const r=await window.storage.get(k,!!shared);return r&&r.value?JSON.parse(r.value):null;}const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
    async set(k,v,shared){try{if(window.storage){await window.storage.set(k,JSON.stringify(v),!!shared);return;}localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
    async del(k,shared){try{if(window.storage){await window.storage.delete(k,!!shared);return;}localStorage.removeItem(k);}catch(e){}}
  };
  let fbDb=null,fbDataRef=null,fbAuthRef=null,fbSeeded=false;
  function fbInit(){firebase.initializeApp(FIREBASE_CONFIG);fbDb=firebase.firestore();fbDataRef=fbDb.collection('pollen').doc('data');fbAuthRef=fbDb.collection('pollen').doc('auth');}
  async function saveAuth(){if(FB_READY&&fbAuthRef){try{await fbAuthRef.set(auth);}catch(e){}return;}await Store.set(AKEY,auth,true);}
  function saveUiState(){try{localStorage.setItem('pollen_ui_v3',JSON.stringify({tab:ui.tab,matView:ui.matView,openRegions:ui.openRegions,typeFilter:ui.typeFilter}));}catch(e){}}
  function loadUiState(){try{const v=localStorage.getItem('pollen_ui_v3');if(v){const s=JSON.parse(v);if(s.tab)ui.tab=s.tab;if(s.matView)ui.matView=s.matView;if(s.openRegions)ui.openRegions=s.openRegions;if(s.typeFilter)ui.typeFilter=s.typeFilter;}}catch(e){}}

  function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  function hash(s){let h=5381;for(let i=0;i<s.length;i++){h=(((h<<5)+h)+s.charCodeAt(i))&0xffffffff;}return(h>>>0).toString(16);}
  function serialToISO(s){return new Date(Date.UTC(1899,11,30)+s*86400000).toISOString().slice(0,10);}
  function todayISO(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
  function fmtDate(iso){if(!iso)return'';const p=iso.split('-');return p[0]+'.'+p[1]+'.'+p[2];}
  function wd(iso){if(!iso)return'';const p=iso.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);return'('+['일','월','화','수','목','금','토'][d.getDay()]+')';}
  function daysSince(iso){if(!iso)return 0;const p=iso.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);return Math.floor((Date.now()-d.getTime())/86400000);}
  function num(n){return(Math.round(n*10)/10).toLocaleString('ko-KR',{maximumFractionDigits:1});}
  function boxes(kg){return(Math.round(kg/BOX_KG*10)/10).toLocaleString('ko-KR',{maximumFractionDigits:1});}
  function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function shortType(t){return(t||'').replace(/생화분|건조화분/,'').replace(/[()]/g,'').trim()||t;}
  function makeIcons(){try{const c=document.createElement('canvas');c.width=c.height=180;const x=c.getContext('2d');const g=x.createLinearGradient(0,0,180,180);g.addColorStop(0,'#E0962B');g.addColorStop(1,'#A9650F');x.fillStyle=g;x.fillRect(0,0,180,180);const cx=90,cy=90;x.fillStyle='#fff';for(let i=0;i<8;i++){x.save();x.translate(cx,cy);x.rotate(i*Math.PI/4);x.beginPath();x.ellipse(0,-37,17,27,0,0,Math.PI*2);x.fill();x.restore();}x.fillStyle='#FFE6A3';x.beginPath();x.arc(cx,cy,26,0,Math.PI*2);x.fill();const url=c.toDataURL('image/png');const ti=document.getElementById('touchicon');if(ti)ti.href=url;}catch(e){}}

  function freshLots(){return state.lots.filter(l=>l.kind==='fresh');}
  function dryLots(){return state.lots.filter(l=>l.kind==='dry');}
  function lotUsedExcl(lot,exclId){if(lot.kind!=='fresh')return 0;return state.batches.filter(b=>b.freshLotId===lot.id&&b.id!==exclId).reduce((a,b)=>a+b.freshQty,0);}
  function lotUsed(lot){return lotUsedExcl(lot,null);}
  function lotDisposed(lot){if(lot.kind!=='fresh')return 0;return (state.disposals||[]).filter(d=>d.kind==='fresh'&&d.freshLotId===lot.id).reduce((a,d)=>a+(d.qty||0),0);}
  function lotRemain(lot){return Math.max(0,lot.qty-lotUsed(lot)-lotDisposed(lot));}
  function freshTotals(){const inn=freshLots().reduce((a,l)=>a+l.qty,0);const used=state.batches.reduce((a,b)=>a+b.freshQty,0);const disp=(state.disposals||[]).filter(d=>d.kind==='fresh').reduce((a,d)=>a+(d.qty||0),0);return{inn,used,disp,rem:inn-used-disp};}
  function dryTotals(){const inn=dryLots().reduce((a,l)=>a+l.qty,0);const used=state.batches.reduce((a,b)=>a+(b.dryQty||0),0);const disp=(state.disposals||[]).filter(d=>d.kind==='dry').reduce((a,d)=>a+(d.qty||0),0);return{inn,used,disp,rem:inn-used-disp};}
  function disposeTotals(){const f=(state.disposals||[]).filter(d=>d.kind==='fresh').reduce((a,d)=>a+(d.qty||0),0);const dr=(state.disposals||[]).filter(d=>d.kind==='dry').reduce((a,d)=>a+(d.qty||0),0);return{fresh:f,dry:dr,total:f+dr,count:(state.disposals||[]).length};}
  function batchStats(){const c=state.batches.length;const dough=state.batches.reduce((a,b)=>a+b.freshQty+(b.dryQty||0),0);
    const by={},res={};state.batches.forEach(b=>{const p=b.place||'미지정';by[p]=(by[p]||0)+1;const r=b.result||'미입력';res[r]=(res[r]||0)+1;});
    const pending=state.batches.filter(b=>!b.result).length;
    const due=state.batches.filter(b=>!b.result&&daysSince(b.date)>=DUE_DAYS).length;
    return{c,dough,by,res,pending,due};}
  function computeBatch(mode,rf,qty){let fresh,dry,total;if(mode==='fresh'){fresh=qty;total=rf>0?qty/(rf/100):qty;dry=Math.max(0,total-fresh);}else if(mode==='dry'){dry=qty;const drFrac=(100-rf)/100;total=drFrac>0?qty/drFrac:qty;fresh=Math.max(0,total-dry);}else{total=qty;fresh=total*rf/100;dry=Math.max(0,total-fresh);}return{rf,fresh:Math.round(fresh*100)/100,dry:Math.round(dry*100)/100,total:Math.round(total*100)/100};}

  function seed(){
    const L=[['L1',45778,'박명준','생화분(도토리)',20,''],['L2',46126,'고흥(박명준)','생화분(도토리)',40,''],['L3',46127,'고흥(박명준)','생화분(도토리)',40,''],['L4',46128,'고흥(박명준)','생화분(도토리)',80,''],['L5',46129,'고흥(박명준)','생화분(도토리)',140,''],['L6',46133,'여수(박명준)','생화분(도토리)',260,''],['L7',46137,'강진(박명준)','생화분(도토리)',180,''],['L8',46134,'강진(박명준)','생화분(도토리)',80,''],['L9',46140,'여수(박명준)','생화분(도토리)',600,'30박스'],['L10',46140,'횡성(홍기표)','생화분(도토리)',180,''],['L11',46141,'여수(박명준)','생화분(도토리)',220,''],['L12',46142,'강진(박명준)','생화분(도토리)',60,''],['L13',46143,'강진(박명준)','생화분(도토리)',40,''],['L14',46149,'횡성(홍기표)','생화분(도토리)',180,''],['L15',46149,'산청(이정돌)','생화분(도토리)',100,''],['L16',46161,'부여(대박 최봉규)','생화분(유채_중국)',100,'']];
    const B=[['B1',46153,'L15',10,'미지정','불량','여왕벌 다량 폐사'],['B2',46162,'L15',10,'미지정','불량','여왕벌 다량 폐사'],['B3',46164,'L16',40,'미지정','관찰중','테스트 사용'],['B4',46167,'L2',10,'미지정','',''],['B5',46172,'L2',10,'미지정','',''],['B6',46178,'L2',10,'미지정','',''],['B7',46183,'L2',10,'미지정','',''],['B8',46188,'L10',10,'미지정','',''],['B9',46193,'L10',30,'미지정','','']];
    state.lots=L.map(r=>({id:r[0],kind:'fresh',date:serialToISO(r[1]),region:r[2],type:r[3],qty:r[4],note:r[5]}));
    state.batches=B.map(r=>({id:r[0],date:serialToISO(r[1]),freshLotId:r[2],freshQty:r[3],dryQty:0,ratioFresh:100,place:r[4],note:r[6],result:r[5],resultDate:'',resultNote:''}));
  }
  function migrate(d){
    (d.lots||[]).forEach(l=>{if(!l.kind)l.kind='fresh';});
    if(!d.batches&&d.usages)d.batches=d.usages.map(u=>({id:u.id,date:u.date,freshLotId:u.lotId,freshQty:u.qty,dryQty:0,ratioFresh:100,place:'미지정',note:u.note||'',result:'',resultDate:'',resultNote:''}));
    (d.batches||[]).forEach(b=>{if(b.dryQty==null)b.dryQty=0;if(b.ratioFresh==null)b.ratioFresh=100;if(b.resultDate==null)b.resultDate='';if(b.resultNote==null)b.resultNote='';if(b.result==null)b.result='';if(b.dryLotId==null)b.dryLotId='';});
    (d.disposals||[]).forEach(x=>{if(x.qty==null)x.qty=0;if(!x.kind)x.kind='fresh';});
    return{lots:d.lots||[],batches:d.batches||[],disposals:d.disposals||[]};
  }

  /* ---------- render ---------- */
  function render(){renderHeader();renderInventory();renderHistory();}
  function renderHeader(){
    const f=freshTotals(),d=dryTotals(),bs=batchStats();
    const fRem=Math.max(0,f.rem),dRem=Math.max(0,d.rem);
    document.getElementById('h-fresh').textContent=num(fRem);
    document.getElementById('h-freshbox').textContent='약 '+boxes(fRem)+'박스';
    document.getElementById('h-dry').textContent=num(dRem);
    document.getElementById('h-drybox').textContent=d.inn>0?('약 '+boxes(dRem)+'박스'):'입고 미등록';
    // 사용 누적 (선택 연도)
    const yr=ui.usedYear||'전체';
    const inYr=b=>yr==='전체'||(b.date||'').slice(0,4)===yr;
    const fUsedY=state.batches.filter(inYr).reduce((a,b)=>a+b.freshQty,0);
    const dUsedY=state.batches.filter(inYr).reduce((a,b)=>a+(b.dryQty||0),0);
    const ylab=yr==='전체'?'':` (${yr})`;
    const fl=document.getElementById('h-fresh-used-k'); if(fl)fl.textContent='생화분 사용 누적'+ylab;
    const dl2=document.getElementById('h-dry-used-k'); if(dl2)dl2.textContent='건조화분 사용 누적'+ylab;
    document.getElementById('h-fresh-used').textContent=num(fUsedY)+' kg';
    document.getElementById('h-dry-used').textContent=num(dUsedY)+' kg';
    // 사용 누적 연도 칩
    const years=[...new Set(state.batches.map(b=>(b.date||'').slice(0,4)).filter(Boolean))].sort((a,b)=>b<a?-1:1);
    if(years.indexOf(yr)<0&&yr!=='전체')ui.usedYear='전체';
    const yc=document.getElementById('used-year');
    if(yc)yc.innerHTML=['전체',...years].map(y=>`<button class="chip${(ui.usedYear||'전체')===y?' on':''}" onclick="POLLEN.setUsedYear('${y}',this)">${y==='전체'?'전체':y+'년'}</button>`).join('');
    document.getElementById('h-dry-used').textContent=num(dUsedY)+' kg';
    let pills='';
    if(bs.due>0)pills+=`<div class="pill alert"><div class="pk">결과 기록 권장</div><div class="pv">${bs.due}건</div></div>`;
    pills+=`<div class="pill"><div class="pk">결과 미입력</div><div class="pv">${bs.pending}건</div></div>`+
      `<div class="pill"><div class="pk">먹이 사용 횟수</div><div class="pv">${bs.c}회</div></div>`+
      `<div class="pill"><div class="pk">누적 사용량(배합)</div><div class="pv">${num(bs.dough)} kg</div></div>`+
      `<div class="pill"><div class="pk">산란실 사용</div><div class="pv">${bs.by['산란실']||0}회</div></div>`+
      `<div class="pill"><div class="pk">사육실 사용</div><div class="pv">${bs.by['사육실']||0}회</div></div>`;
    const strip=document.getElementById('strip');if(strip){strip.style.display='flex';strip.innerHTML=pills;}
  }
  function statusOf(lot){const rem=lotRemain(lot);if(rem<=0)return{cls:'st-zero',txt:'사용완료',bar:'b-zero'};if(rem/lot.qty<=0.25)return{cls:'st-low',txt:'잔량 적음',bar:''};return{cls:'st-full',txt:'보유중',bar:''};}
  function lotLastUse(lot){const ds=state.batches.filter(b=>b.freshLotId===lot.id).map(b=>b.date).sort();return ds.length?ds[ds.length-1]:'';}
  function isOldDone(lot){if(lot.kind!=='fresh')return false;if(lotRemain(lot)>0)return false;const lu=lotLastUse(lot);return daysSince(lot.date)>365&&!!lu&&daysSince(lu)>365;}

  function renderFilters(){
    let src;
    if(ui.matView==='dry')src=dryLots();
    else if(ui.matView==='fresh')src=freshLots();
    else src=[...freshLots(),...dryLots()];
    const cats=['전체',...[...new Set(src.map(l=>shortType(l.type)))].filter(Boolean).sort()];
    if(cats.indexOf(ui.typeFilter)<0)ui.typeFilter='전체';
    const el=document.getElementById('inv-filters');if(!el)return;
    el.innerHTML=cats.map(c=>`<button class="chip${ui.typeFilter===c?' on':''}" onclick="POLLEN.setType('${esc(c).replace(/'/g,"\\'")}')">${esc(c)}</button>`).join('');
  }
  function freshGroupHTML(g){
    const open=ui.openRegions[g.region];
    const active=g.gl.filter(l=>lotRemain(l)>0),done=g.gl.filter(l=>lotRemain(l)<=0);
    const lr=active.concat(done).map(l=>{const rem=lotRemain(l),used=lotUsed(l),disp=lotDisposed(l),s=statusOf(l);const pct=l.qty>0?Math.max(2,Math.round(rem/l.qty*100)):0;const dc=rem<=0?' done':'';
      return `<div class="lot${dc}"><div class="ltop"><span class="ldate">${fmtDate(l.date)}${l.note?` · ${esc(l.note)}`:''}</span><span class="lstat ${s.cls}">${s.txt}</span></div><div class="lnums"><span>입고 <b>${num(l.qty)}</b></span><span>사용 <b>${num(used)}</b></span>${disp>0?`<span class="disp">폐기 <b>${num(disp)}</b></span>`:''}<span class="rem">잔량 <b>${num(rem)}kg</b></span></div><div class="bar ${s.bar}"><i style="width:${pct}%"></i></div></div>`;}).join('');
    const gdisp=g.gl.reduce((a,l)=>a+lotDisposed(l),0);

  function dryGroupHTML(dl){

  function renderInventory(){
    document.querySelectorAll('#mat-seg button').forEach(b=>b.classList.toggle('on',b.dataset.mv===ui.matView));
    renderFilters();
    const wrap=document.getElementById('inv-list');let html='';
    const mat=ui.matView,q=ui.search.trim();
    if(mat==='all'||mat==='fresh'){
      let lots=freshLots().slice();
      if(!ui.showOld)lots=lots.filter(l=>!isOldDone(l));
      if(mat!=='dry'&&ui.typeFilter!=='전체')lots=lots.filter(l=>shortType(l.type)===ui.typeFilter);
      if(q)lots=lots.filter(l=>l.region.includes(q)||l.type.includes(q));
      const groups={};lots.forEach(l=>{(groups[l.region]=groups[l.region]||[]).push(l);});
      const arr=Object.keys(groups).map(region=>{const gl=groups[region].slice().sort((a,b)=>a.date>b.date?-1:1);const inn=gl.reduce((a,l)=>a+l.qty,0),used=gl.reduce((a,l)=>a+lotUsed(l),0);return{region,gl,inn,used,rem:inn-used,latest:gl[0]?gl[0].date:'',depleted:(inn-used)<=0,types:[...new Set(gl.map(l=>l.type))]};});
      arr.sort((a,b)=>{if(a.depleted!==b.depleted)return a.depleted?1:-1;return a.latest>b.latest?-1:(a.latest<b.latest?1:0);});
      html+=arr.map(freshGroupHTML).join('');
      if(mat==='fresh'&&!html)html='<div class="empty">표시할 생화분 재고가 없어요.</div>';
    }
    if(mat==='all'||mat==='dry'){
      let dl=dryLots().slice();const d=dryTotals();
      const filtered=(ui.typeFilter!=='전체')||!!q;
      if(ui.typeFilter!=='전체')dl=dl.filter(l=>shortType(l.type)===ui.typeFilter);
      if(q)dl=dl.filter(l=>l.region.includes(q)||l.type.includes(q));
      const show=filtered?(dl.length>0):(dryLots().length>0||d.used>0);

    }
    if(!html)html='<div class="empty">표시할 재고가 없어요.<br>관리자 로그인 후 <b>입고</b> 탭에서 등록하세요.</div>';

  function renderHistory(){
    const wrap=document.getElementById('hist-list');
    const items=[];
    state.lots.forEach(l=>items.push({sort:l.date+'~'+l.id,date:l.date,kind:l.kind==='dry'?'dryin':'in',rec:l}));
    state.batches.forEach(b=>items.push({sort:b.date+'~'+b.id,date:b.date,kind:'out',rec:b}));
    (state.disposals||[]).forEach(x=>items.push({sort:x.date+'~'+x.id,date:x.date,kind:'disp',rec:x}));
    // 연도 칩 구성 (전체 / 최근연도 → 지난 연도)
    const years=[...new Set(items.map(i=>(i.date||'').slice(0,4)).filter(Boolean))].sort((a,b)=>b<a?-1:1);
    if(years.indexOf(ui.histYear)<0&&ui.histYear!=='전체')ui.histYear='전체';
    const yc=document.getElementById('hist-years');
    if(yc)yc.innerHTML=['전체',...years].map(y=>`<button class="chip${ui.histYear===y?' on':''}" onclick="POLLEN.setYear('${y}',this)">${y==='전체'?'전체':y+'년'}</button>`).join('');
    let list=items;
    if(ui.histFilter==='입고')list=items.filter(i=>i.kind==='in'||i.kind==='dryin');
    else if(ui.histFilter==='사용')list=items.filter(i=>i.kind==='out');
    else if(ui.histFilter==='폐기')list=items.filter(i=>i.kind==='disp');
    if(ui.histYear!=='전체')list=list.filter(i=>(i.date||'').slice(0,4)===ui.histYear);
    list=list.slice().sort((a,b)=>a.sort<b.sort?1:(a.sort>b.sort?-1:0));
    if(list.length===0){wrap.innerHTML='<div class="empty">기록이 없어요.</div>';return;}
    let html='',curDate='';
    list.forEach(it=>{
      if(it.date!==curDate){curDate=it.date;html+=`<div class="datehead">${fmtDate(it.date)}<span class="wd">${wd(it.date)}</span></div>`;}
      if(it.kind==='out'){
        const b=it.rec;const dryOnly=!(b.freshQty>0);const srcLot=state.lots.find(x=>x.id===(dryOnly?b.dryLotId:b.freshLotId))||{};const srcTxt=srcLot.region||(dryOnly?'건조화분 소분/공급':'(삭제됨)');const ratio=`${num(b.ratioFresh)}:${num(100-b.ratioFresh)}`;
        const overdue=!b.result&&daysSince(b.date)>=DUE_DAYS;

        if(b.result)resLine=`<div class="h3 res-${b.result}">결과: ${b.result}${b.resultDate?` (${fmtDate(b.resultDate)})`:''}${b.resultNote?` · ${esc(b.resultNote)}`:''}</div>`;
        else if(isAdmin)resLine=`<div class="rbtn${overdue?' due':''}" onclick="event.stopPropagation();POLLEN.openEdit('batch','${b.id}')">${overdue?`결과 기록 권장 (사용 ${daysSince(b.date)}일 경과)`:'결과 입력'}</div>`;
        else resLine=`<div class="rbtn muted">결과 미입력</div>`;
        const mb=[];if(b.freshQty>0)mb.push(`<span class="mb fresh">생화분 ${num(b.freshQty)}kg</span>`);if((b.dryQty||0)>0)mb.push(`<span class="mb dry">건조 ${num(b.dryQty||0)}kg</span>`);mb.push(`<span class="mb ratio">비율 ${ratio}</span>`);
        const srcLine=`<div class="h-src">출처: <span class="rsrc">${esc(srcTxt)}</span></div><div class="h-mix">${mb.join('')}</div>`;
        const memoLine=b.note?`<div class="h-memo">📝 ${esc(b.note)}</div>`:'';
        html+=`<div class="hitem out${overdue?' overdue':''}${isAdmin?' tap':''}"${isAdmin?` onclick="POLLEN.openEdit('batch','${b.id}')"`:''}><div class="htag out">${esc((b.place||'미지정').slice(0,2))}<br>사용</div><div class="hbody"><div class="h1">${esc(b.place||'미지정')} 사용</div>${srcLine}${memoLine}${resLine}</div><div class="hright"><div class="hqty out">${num(b.freshQty+(b.dryQty||0))}kg</div>${isAdmin?`<button class="hdel" onclick="event.stopPropagation();POLLEN.del('batch','${b.id}')">×</button>`:''}</div></div>`;
      }else if(it.kind==='disp'){
        const x=it.rec;const fresh=x.kind==='fresh';const lot=fresh?(state.lots.find(l=>l.id===x.freshLotId)||{}):null;
        const memoLine=x.note?`<div class="h-memo">📝 ${esc(x.note)}</div>`:'';
        html+=`<div class="hitem disp${isAdmin?' tap':''}"${isAdmin?` onclick="POLLEN.del('disposal','${x.id}')"`:''}><div class="htag disp">폐기</div><div class="hbody"><div class="h1">${fresh?'생화분 폐기':'건조화분 폐기'}${fresh&&lot&&lot.region?` · ${esc(lot.region)}`:''}</div><div class="h2">사유: ${esc(x.reason||'-')}${fresh&&lot?` · ${esc(shortType(lot.type||''))}`:''}</div>${memoLine}</div><div class="hright"><div class="hqty disp">-${num(x.qty)}kg</div>${isAdmin?`<button class="hdel" onclick="event.stopPropagation();POLLEN.del('disposal','${x.id}')">×</button>`:''}</div></div>`;
      }else{
        const l=it.rec;const dry=it.kind==='dryin';
        const memoLine=l.note?`<div class="h-memo">📝 ${esc(l.note)}</div>`:'';
        html+=`<div class="hitem ${dry?'dryin':'in'}${isAdmin?' tap':''}"${isAdmin?` onclick="POLLEN.openEdit('lot','${l.id}')"`:''}><div class="htag ${dry?'dryin':'in'}">${dry?'건조<br>입고':'생화분<br>입고'}</div><div class="hbody"><div class="h1">${dry?'건조화분 입고':'생화분 입고'} · ${esc(l.region||(dry?'건조화분':''))}</div><div class="h2">${esc(shortType(l.type))} · 입고 ${num(l.qty)}kg</div>${memoLine}</div><div class="hright"><div class="hqty ${dry?'dryin':'in'}">+${num(l.qty)}kg</div>${isAdmin?`<button class="hdel" onclick="event.stopPropagation();POLLEN.del('lot','${l.id}')">×</button>`:''}</div></div>`;
      }
    });
    wrap.innerHTML=html;
  }

  /* ---------- 사용 생성 폼 (인라인) + 출처 선택 모달 ---------- */
  let selBatchLot='', selDryLot='', batchSearchTxt='';
  function currentCalc(){
    if(ui.ratioMode==='amount'){
      const f=parseFloat((document.getElementById('b-fresh-amt')||{}).value)||0;
      const d=parseFloat((document.getElementById('b-dry-amt')||{}).value)||0;
      const total=f+d;const rf=total>0?Math.round(f/total*1000)/10:0;
      return{rf,fresh:Math.round(f*100)/100,dry:Math.round(d*100)/100,total:Math.round(total*100)/100};
    }
    return computeBatch(ui.ratioMode,ratioFreshVal(),parseFloat(document.getElementById('b-qty').value)||0);
  }
  function isDryOnly(){return currentCalc().fresh===0&&currentCalc().total>0||(ui.ratioMode!=='amount'&&ratioFreshVal()===0);}
  function renderBatchForm(){

  function updateSourceBtn(){

    if(label)label.innerHTML=dryOnly?'건조화분 출처 <span class="reqmark">(선택 안 해도 됨)</span>':'생화분 출처 <span class="reqmark">(눌러서 선택)</span>';

  function ratioFreshVal(){const v=document.getElementById('b-ratio').value;return v==='custom'?Math.min(100,Math.max(0,parseFloat(document.getElementById('b-ratio-custom').value)||0)):parseFloat(v);}
  function recalc(){
    const pv=document.getElementById('b-preview'); if(!pv)return;
    pv.className='preview m-'+ui.ratioMode;
    const c=currentCalc();
    const dryOnly=c.fresh===0;
    let sub=`<b>생화분 ${num(c.rf)}% : 건조화분 ${num(100-c.rf)}%</b>`;
    if(dryOnly){
      sub+=` &nbsp;|&nbsp; 건조화분만 사용(소분/공급)`;
    }else{
      const lot=freshLots().find(l=>l.id===selBatchLot);
      if(lot){const rem=lotRemain(lot);sub+=` &nbsp;|&nbsp; ${esc(lot.region)} 잔량 ${num(rem)}kg`;if(c.fresh>rem)sub+=` <span class="warn">→ 생화분 부족!</span>`;}
      else sub+=` &nbsp;|&nbsp; <span class="warn">출처를 먼저 선택하세요</span>`;
    }
    const d=dryTotals();if(c.dry>0&&d.inn>0&&c.dry>d.rem)sub+=` <span class="warn">· 건조화분 부족(${num(d.rem)}kg)</span>`;
    document.querySelector('#b-preview .pmain').textContent=`생화분 ${num(c.fresh)}kg + 건조화분 ${num(c.dry)}kg = 총 배합량 ${num(c.total)}kg`;
    document.querySelector('#b-preview .psub').innerHTML=sub;
  }

  function modalRatioVal(){const v=document.getElementById('m-ratio').value;return v==='custom'?Math.min(100,Math.max(0,parseFloat(document.getElementById('m-ratio-custom').value)||0)):parseFloat(v);}
  function modalRecalc(){
    const rf=modalRatioVal();const qty=parseFloat(document.getElementById('m-qty').value)||0;
    const c=rf===0?{rf:0,fresh:0,dry:qty,total:qty}:computeBatch('fresh',rf,qty);
    const lot=rf===0?null:freshLots().find(l=>l.id===document.getElementById('m-lot').value);
    let sub=`생화분 ${num(c.rf)}% · 건조화분 ${num(100-c.rf)}%`;
    if(lot){const avail=lot.qty-lotUsedExcl(lot,ui.edit&&ui.edit.id);sub+=` &nbsp;|&nbsp; 사용가능 ${num(avail)}kg`;if(c.fresh>avail)sub+=` <span class="warn">→ 초과!</span>`;}
    else if(rf===0)sub+=` &nbsp;|&nbsp; 건조화분만 사용`;
    document.querySelector('#m-preview .pmain').textContent=`생화분 ${num(c.fresh)}kg + 건조화분 ${num(c.dry)}kg = 총 ${num(c.total)}kg`;
    document.querySelector('#m-preview .psub').innerHTML=sub;
  }

  function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},600);}
  async function buildReport(name){
    const H='FFA9650F',HSOFT='FFFBEEDA',LINE='FFE9DFCD',INK='FF241B12',TOT='FFF3ECDD',W='FFFFFFFF',MUT='FF857967';

    function body(ws,r,n,opts){opts=opts||{};for(let i=1;i<=n;i++){const c=ws.getRow(r).getCell(i);c.border=bd;c.font={size:11,name:'맑은 고딕',bold:!!opts.bold};c.alignment={vertical:'middle',horizontal:opts.align&&opts.align[i-1]||'left'};if(opts.num&&opts.num.indexOf(i)>=0)c.numFmt='#,##0.0';if(opts.fill)c.fill={type:'pattern',pattern:'solid',fgColor:{argb:opts.fill}};}}

    // 요약 시트

    s.getRow(r).values=['건조화분(유채)',d.inn,d.used,d.disp,d.rem];body(s,r,5,{num:[2,3,4,5],align:['left','right','right','right','right']});r+=2;
    title(s,r,'■ 사용(배합) 요약',4);r++;
    s.getRow(r).values=['항목','값','',''];header(s,r,2);r++;
    [['먹이 사용 횟수',bs.c+' 회'],['누적 사용량(배합,kg)',num(bs.dough)],['산란실 사용',(bs.by['산란실']||0)+' 회'],['사육실 사용',(bs.by['사육실']||0)+' 회'],['기타/미지정',(bs.by['미지정']||0)+' 회']].forEach(row=>{s.getRow(r).values=row;body(s,r,2,{align:['left','right']});r++;});
    r++;title(s,r,'■ 결과 분포',4);r++;
    s.getRow(r).values=['결과','건수','',''];header(s,r,2);r++;
    ['양호','보통','불량','관찰중','미입력'].forEach(k=>{s.getRow(r).values=[k,(bs.res[k]||0)+' 건'];body(s,r,2,{align:['left','right']});r++;});
    s.views=[{showGridLines:false}];

    // 생화분 시트
    const ws=wb.addWorksheet('생화분 입고·재고');ws.columns=[{width:13},{width:18},{width:18},{width:12},{width:12},{width:12},{width:22}];
    title(ws,1,'생화분 입고 · 재고 현황',7,14);
    ws.getRow(3).values=['입고일자','지역(대표)','화분종류','입고(kg)','사용(kg)','잔량(kg)','비고'];header(ws,3,7);
    let rr=4;freshLots().slice().sort((a,b)=>a.region<b.region?-1:(a.region>b.region?1:(a.date<b.date?-1:1))).forEach(l=>{ws.getRow(rr).values=[fmtDate(l.date),l.region,l.type,l.qty,lotUsed(l),lotRemain(l),l.note||''];body(ws,rr,7,{num:[4,5,6],align:['center','left','left','right','right','right','left']});rr++;});
    ws.getRow(rr).values=['합계','','',f.inn,f.used,f.rem,''];body(ws,rr,7,{bold:true,fill:TOT,num:[4,5,6],align:['center','left','left','right','right','right','left']});
    ws.views=[{state:'frozen',ySplit:3,showGridLines:false}];

    // 건조화분 시트
    const wd2=wb.addWorksheet('건조화분');wd2.columns=[{width:13},{width:20},{width:18},{width:12},{width:24}];
    title(wd2,1,'건조화분(유채) 입고',5,14);

    let dr=4;dryLots().slice().sort((a,b)=>a.date<b.date?-1:1).forEach(l=>{wd2.getRow(dr).values=[fmtDate(l.date),l.region||'',l.type,l.qty,l.note||''];body(wd2,dr,5,{num:[4],align:['center','left','left','right','left']});dr++;});
    wd2.getRow(dr).values=['합계','','',d.inn,''];body(wd2,dr,5,{bold:true,fill:TOT,num:[4],align:['center','left','left','right','left']});

    // 폐기 시트
    const wp=wb.addWorksheet('폐기');wp.columns=[{width:13},{width:12},{width:20},{width:18},{width:12},{width:24}];
    title(wp,1,'폐기 내역',6,14);
    wp.getRow(3).values=['폐기일자','구분','출처/지역','사유','폐기(kg)','메모'];header(wp,3,6);
    let pr=4;const dt=disposeTotals();
    (state.disposals||[]).slice().sort((a,b)=>a.date<b.date?-1:1).forEach(x=>{const lot=x.kind==='fresh'?(state.lots.find(l=>l.id===x.freshLotId)||{}):{};wp.getRow(pr).values=[fmtDate(x.date),x.kind==='fresh'?'생화분':'건조화분',x.kind==='fresh'?(lot.region||''):'',x.reason||'',x.qty,x.note||''];body(wp,pr,6,{num:[5],align:['center','center','left','left','right','left']});pr++;});
    if((state.disposals||[]).length===0){wp.getRow(pr).values=['폐기 내역이 없습니다.','','','','',''];body(wp,pr,6,{align:['left']});pr++;}
    wp.getRow(pr).values=['합계','','','',dt.total,''];body(wp,pr,6,{bold:true,fill:TOT,num:[5],align:['center','center','left','left','right','left']});
    wp.views=[{state:'frozen',ySplit:3,showGridLines:false}];
    wd2.views=[{state:'frozen',ySplit:3,showGridLines:false}];

    // 사용 시트
    const wb2=wb.addWorksheet('사용·먹이 기록');wb2.columns=[{width:13},{width:22},{width:11},{width:11},{width:11},{width:11},{width:11},{width:9},{width:13},{width:24}];
    title(wb2,1,'배합 · 먹이 사용 기록',10,14);
    wb2.getRow(3).values=['사용일자','생화분 출처','배합(생/건)','생화분(kg)','건조(kg)','총배합량(kg)','사용처','결과','결과기록일','메모'];header(wb2,3,10);
    let br=4;state.batches.slice().sort((a,b)=>a.date<b.date?1:-1).forEach(b=>{const dryOnly=!(b.freshQty>0);const srcLot=state.lots.find(x=>x.id===(dryOnly?b.dryLotId:b.freshLotId))||{};const srcCell=srcLot.region?(srcLot.region+' '+fmtDate(srcLot.date||'')):(dryOnly?'건조화분 소분/공급':'(삭제)');const note=[b.note,b.resultNote].filter(Boolean).join(' / ');wb2.getRow(br).values=[fmtDate(b.date),srcCell,`${num(b.ratioFresh)}/${num(100-b.ratioFresh)}`,b.freshQty,b.dryQty||0,b.freshQty+(b.dryQty||0),b.place||'',b.result||'미입력',b.resultDate?fmtDate(b.resultDate):'',note];body(wb2,br,10,{num:[4,5,6],align:['center','left','center','right','right','right','center','center','center','left']});br++;});
    wb2.views=[{state:'frozen',ySplit:3,showGridLines:false}];

    const buf=await wb.xlsx.writeBuffer();
    dl(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),name);

  function exportCSV(name){
    const f=freshTotals(),d=dryTotals();
    const esc2=c=>{c=c==null?'':String(c);return/[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;};
    const sec=(t,rows)=>['# '+t].concat(rows.map(r=>r.map(esc2).join(','))).join('\n');
    const fr=[['입고일자','지역(대표)','화분종류','입고(kg)','사용(kg)','잔량(kg)','비고']];freshLots().forEach(l=>fr.push([fmtDate(l.date),l.region,l.type,l.qty,lotUsed(l),lotRemain(l),l.note||'']));fr.push(['합계','','',f.inn,f.used,f.rem,'']);
    const dr=[['입고일자','구입처/지역','종류','입고(kg)','비고']];dryLots().forEach(l=>dr.push([fmtDate(l.date),l.region||'',l.type,l.qty,l.note||'']));
    const bn=[['사용일자','생화분 출처','배합(생/건)','생화분(kg)','건조(kg)','총배합량(kg)','사용처','결과','결과기록일','메모']];state.batches.forEach(b=>{const dryOnly=!(b.freshQty>0);const srcLot=state.lots.find(x=>x.id===(dryOnly?b.dryLotId:b.freshLotId))||{};const srcCell=srcLot.region?(srcLot.region+' '+fmtDate(srcLot.date||'')):(dryOnly?'건조화분 소분/공급':'');bn.push([fmtDate(b.date),srcCell,`${num(b.ratioFresh)}/${num(100-b.ratioFresh)}`,b.freshQty,b.dryQty||0,b.freshQty+(b.dryQty||0),b.place||'',b.result||'미입력',b.resultDate?fmtDate(b.resultDate):'',[b.note,b.resultNote].filter(Boolean).join(' / ')]);});
    const dp=[['폐기일자','구분','출처/지역','사유','폐기(kg)','메모']];(state.disposals||[]).forEach(x=>{const lot=x.kind==='fresh'?(state.lots.find(l=>l.id===x.freshLotId)||{}):{};dp.push([fmtDate(x.date),x.kind==='fresh'?'생화분':'건조화분',x.kind==='fresh'?(lot.region||''):'',x.reason||'',x.qty,x.note||'']);});
    const csv='\uFEFF'+[sec('생화분',fr),sec('건조화분',dr),sec('사용기록',bn),sec('폐기',dp)].join('\n\n');
    dl(new Blob([csv],{type:'text/csv'}),name);
  }

  function setFormMode(){
    ['panel-in','panel-use'].forEach(pid=>{
      const card=document.querySelector('#'+pid+' .formcard');if(!card)return;
      card.classList.toggle('locked',!isAdmin);
      card.querySelectorAll('input,select,textarea,.seg button').forEach(el=>{el.disabled=!isAdmin;});
      const nl=card.querySelector('.needlogin');if(nl)nl.style.display=isAdmin?'none':'';
      const sub=card.querySelector('.submit');if(sub){sub.style.opacity=isAdmin?'':'.55';sub.textContent=isAdmin?(pid==='panel-in'?'입고 등록':'사용 기록'):'관리자 로그인 후 입력 가능';}
    });
  }
  function navHTML(){
    const ic={inv:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
      in:'<path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 21h16"/>',
      use:'<path d="M3 3v5h5"/><path d="M3.5 14a8 8 0 1 0 1.5-6L3 8"/><circle cx="12" cy="12" r="2.5"/>',
      hist:'<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4"/><path d="M12 8v4l3 2"/>'};
    const tabs=[['inv','재고'],['in','입고'],['use','사용'],['hist','이력']];

    async addLot(){
      if(!isAdmin){openLogin();return;}const date=document.getElementById('in-date').value;const region=document.getElementById('in-region').value.trim();const type=document.getElementById('in-type').value.trim();let qty=parseFloat(document.getElementById('in-qty').value);const note=document.getElementById('in-note').value.trim();const err=document.getElementById('in-err');
      if(ui.inboundKind==='fresh'&&!region){err.textContent='지역(대표)을 입력해 주세요.';err.classList.add('show');return;}
      if(!type||!(qty>0)){err.textContent='화분종류와 입고량을 올바르게 입력해 주세요.';err.classList.add('show');return;}
      err.classList.remove('show');if(ui.inboundUnit==='box')qty*=BOX_KG;
      state.lots.push({id:uid('L'),kind:ui.inboundKind,date:date||todayISO(),region,type,qty,note});
      await persist();render();document.getElementById('in-region').value='';document.getElementById('in-qty').value='';document.getElementById('in-note').value='';toast(`입고 등록 · ${num(qty)}kg`);this.tab('inv');

    async addBatch(){
      if(!isAdmin){openLogin();return;}
      const date=document.getElementById('b-date').value;const err=document.getElementById('b-err');
      const place=document.getElementById('b-place').value==='custom'?(document.getElementById('b-place-custom').value.trim()||'기타'):document.getElementById('b-place').value;const note=document.getElementById('b-note').value.trim();
      const c=currentCalc();
      if(!(c.total>0)){err.textContent='사용량(배합량)을 올바르게 입력해 주세요.';err.classList.add('show');return;}
      let freshLotId='',dryLotId='';
      if(c.fresh>0){
        const lot=freshLots().find(l=>l.id===selBatchLot);
        if(!lot){err.textContent='생화분 출처를 선택해 주세요.';err.classList.add('show');return;}
        if(c.fresh>lotRemain(lot)){err.textContent=`생화분 잔량(${num(lotRemain(lot))}kg)보다 많이 사용할 수 없어요.`;err.classList.add('show');return;}
        freshLotId=lot.id;
      }else{
        dryLotId=selDryLot||'';
      }
      const d=dryTotals();
      if(c.dry>0&&d.inn>0&&c.dry>d.rem){err.textContent=`건조화분 잔량(${num(d.rem)}kg)보다 많이 사용할 수 없어요.`;err.classList.add('show');return;}
      err.classList.remove('show');
      state.batches.push({id:uid('B'),date:date||todayISO(),freshLotId,dryLotId,freshQty:c.fresh,dryQty:c.dry,ratioFresh:c.rf,place,note,result:'',resultDate:'',resultNote:''});
      await persist();render();renderBatchForm();toast(`사용 기록 · 총 ${num(c.total)}kg → ${place} (결과는 이력에서 나중에 입력)`);this.tab('hist');
    },

    openEdit(type,id){if(!isAdmin)return;if(type==='lot'){const l=state.lots.find(x=>x.id===id);if(l){ui.edit={type,id};openEditLot(l);}}else{const b=state.batches.find(x=>x.id===id);if(b){ui.edit={type,id};openEditBatch(b);}}},
    async saveLot(){
      const id=ui.edit.id;const l=state.lots.find(x=>x.id===id);if(!l)return;const err=document.getElementById('m-err');
      const qty=parseFloat(document.getElementById('m-qty').value);const region=document.getElementById('m-region').value.trim();const type=document.getElementById('m-type').value.trim();
      if(!type||!(qty>0)){err.textContent='종류와 입고량을 확인해 주세요.';err.classList.add('show');return;}
      const used=lotUsed(l);if(l.kind==='fresh'&&qty<used){err.textContent=`이미 사용한 양(${num(used)}kg)보다 적게 설정할 수 없어요.`;err.classList.add('show');return;}
      l.date=document.getElementById('m-date').value||l.date;l.region=region;l.type=type;l.qty=qty;l.note=document.getElementById('m-note').value.trim();
      await persist();hideSheet();render();toast('수정 저장됨');
    },
    async saveBatch(){
      const id=ui.edit.id;const b=state.batches.find(x=>x.id===id);if(!b)return;const err=document.getElementById('m-err');
      const rf=modalRatioVal();const qty=parseFloat(document.getElementById('m-qty').value)||0;
      const place=document.getElementById('m-place').value==='custom'?(document.getElementById('m-place-custom').value.trim()||'기타'):document.getElementById('m-place').value;
      if(rf===0){
        if(!(qty>0)){err.textContent='건조화분량을 확인해 주세요.';err.classList.add('show');return;}
        b.freshLotId='';b.freshQty=0;b.dryQty=qty;b.ratioFresh=0;
      }else{
        const lotId=document.getElementById('m-lot').value;const lot=freshLots().find(l=>l.id===lotId);if(!lot){err.textContent='출처를 선택해 주세요.';err.classList.add('show');return;}
        const c=computeBatch('fresh',rf,qty);
        if(!(c.fresh>0)){err.textContent='생화분량을 확인해 주세요.';err.classList.add('show');return;}
        const avail=lot.qty-lotUsedExcl(lot,id);if(c.fresh>avail){err.textContent=`사용 가능량(${num(avail)}kg)을 초과했어요.`;err.classList.add('show');return;}
        b.freshLotId=lotId;b.freshQty=c.fresh;b.dryQty=c.dry;b.ratioFresh=c.rf;
      }
      b.date=document.getElementById('m-date').value||b.date;b.place=place;b.note=document.getElementById('m-note').value.trim();
      b.result=ui.modalResult;b.resultDate=document.getElementById('m-resdate').value;b.resultNote=document.getElementById('m-resnote').value.trim();
      if(b.result&&!b.resultDate)b.resultDate=todayISO();
      await persist();hideSheet();render();toast('수정 저장됨');
    },
    async del(kind,id,fromModal){

            <div class="field"><label>배합 비율 (생화분 : 건조화분)</label><select id="b-ratio" onchange="POLLEN.onRatio()"><option value="100">생화분 100% (건조 0%)</option><option value="50">생화분 50% : 건조 50%</option><option value="40">생화분 40% : 건조 60%</option><option value="35">생화분 35% : 건조 65%</option><option value="30">생화분 30% : 건조 70%</option><option value="0">생화분 0% : 건조 100% (건조만 소분/공급)</option><option value="custom">직접 입력</option></select><input type="number" id="b-ratio-custom" inputmode="decimal" placeholder="생화분 비율 % (예: 45)" style="display:none;margin-top:7px;" oninput="POLLEN.onBatch()"></div>
          </div>
          <div id="b-amounts" style="display:none;">
            <div class="field"><label>생화분량 (kg)</label><input type="number" id="b-fresh-amt" inputmode="decimal" placeholder="예: 6" oninput="POLLEN.onBatch()"></div>
            <div class="field"><label>건조화분량 (kg)</label><input type="number" id="b-dry-amt" inputmode="decimal" placeholder="예: 10" oninput="POLLEN.onBatch()"></div>
          </div>
          <div class="preview" id="b-preview"><div class="pmain"></div><div class="psub"></div></div>
          <div class="field"><label>사용처</label><select id="b-place" onchange="document.getElementById('b-place-custom').style.display=this.value==='custom'?'block':'none'"><option>산란실</option><option>사육실</option><option value="custom">직접 입력</option></select><input id="b-place-custom" placeholder="사용처 직접 입력" style="display:none;margin-top:7px;"></div>
          <div class="field"><label>사용 메모 (선택)</label><textarea id="b-note" placeholder="배합·사용 관련 메모"></textarea></div>
          <div class="hint">⏳ 결과(생육상태)는 지금 입력하지 않아요. 먹이 사용 후 한 달쯤 지나 <b>이력 탭</b>에서 해당 건을 눌러 결과를 기록하세요.</div>
          <div class="err" id="b-err"></div>
          <button class="submit use" id="b-submit" onclick="POLLEN.addBatch()">사용 기록</button>
        </div>

        <div class="section-h" style="margin-top:18px;">🗑 폐기 처리</div>
        <div class="formcard">
          <div class="needlogin" style="display:none;">🔒 보기 전용이에요. 입력하려면 <button class="linklike" onclick="POLLEN.askLogin()">관리자 로그인</button>이 필요합니다.</div>
          <div class="hint">변질·오염되었거나 사용 후 남아 버리는 화분을 기록해요. 폐기하면 재고에서 차감되고 이력에 남습니다.</div>
          <div class="seg" id="disp-kind-seg" style="margin-top:10px;"><button class="on" data-k="fresh" onclick="POLLEN.dispKind('fresh')">🌼 생화분</button><button data-k="dry" onclick="POLLEN.dispKind('dry')">🍂 건조화분</button></div>
          <div class="field" id="disp-source-field"><label>생화분 출처 <span class="reqmark">(눌러서 선택)</span></label><button type="button" class="sourcebtn" id="disp-sourcebtn" onclick="POLLEN.openDispPicker()">출처를 선택하세요 ›</button></div>
          <div class="field"><label>폐기일자</label><input type="date" id="disp-date"></div>
          <div class="field"><label>폐기량 (kg)</label><input type="number" id="disp-qty" inputmode="decimal" placeholder="예: 20"></div>
          <div class="field"><label>폐기 사유</label><select id="disp-reason" onchange="document.getElementById('disp-reason-custom').style.display=this.value==='custom'?'block':'none'"><option>변질·오염</option><option>유통기한 경과</option><option>사용 후 잔여</option><option value="custom">기타(직접 입력)</option></select><input id="disp-reason-custom" placeholder="사유 직접 입력" style="display:none;margin-top:7px;"></div>
          <div class="field"><label>메모 (선택)</label><textarea id="disp-note" placeholder="폐기 관련 메모"></textarea></div>
          <div class="err" id="disp-err"></div>
          <button class="submit ghost" id="disp-submit" onclick="POLLEN.saveDispose()">🗑 폐기 기록</button>
        </div>
      </div>

      <div class="panel" id="panel-hist">
        <button class="exportbtn adminonly" onclick="POLLEN.export()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 21h16"/></svg>엑셀 내보내기</button>
        <div class="filters" id="hist-filters" style="margin-top:10px;"><button class="chip on" onclick="POLLEN.setHist('전체',this)">전체</button><button class="chip" onclick="POLLEN.setHist('입고',this)">입고</button><button class="chip" onclick="POLLEN.setHist('사용',this)">사용</button><button class="chip" onclick="POLLEN.setHist('폐기',this)">폐기</button></div>
        <div class="filters yearfilters" id="hist-years" style="margin-top:8px;"></div>
        <div id="hist-list"></div>
        <div id="admin-tools" style="display:none;"><div class="adminbar"><button onclick="POLLEN.settings()">비밀번호 변경</button><button onclick="POLLEN.reset()">기본 데이터로 초기화</button></div></div>
      </div>

      <div class="nav" id="nav"></div>
      <div class="overlay" id="overlay" onclick="if(event.target===this)POLLEN.closeSheet()"><div class="sheet" id="sheet"></div></div>
      <div class="toast" id="toast"></div>
    `;
    applyMode();
  }

  const DEFAULT_PW='d7878';
  async function fallbackInit(){
    let a=await Store.get(AKEY,true);
    if(!a||a.v!==2){a={h:hash(DEFAULT_PW),v:2};await Store.set(AKEY,a,true);}
    auth=a;
    let d=await Store.get(DKEY,true);
    if(!d){const old=await Store.get('pollen_inventory_v2',false)||await Store.get('pollen_inventory_v1',false);if(old){d=migrate(old);}else{seed();d=state;}await Store.set(DKEY,d,true);}
    state=migrate(d);
    buildUI();render();makeIcons();
  }

  async function init(){
    loadUiState();
    const sess=await Store.get(SKEY,false);isAdmin=!!(sess&&sess.admin);
    if(FB_READY){
      try{fbInit();}catch(e){await fallbackInit();return;}
      try{const aDoc=await fbAuthRef.get();const ad=aDoc.exists?aDoc.data():null;if(ad&&ad.v===2){auth=ad;}else{auth={h:hash(DEFAULT_PW),v:2};await fbAuthRef.set(auth);}}
      catch(e){auth={h:hash(DEFAULT_PW),v:2};}
      let firstSnap=true;
      fbDataRef.onSnapshot(async snap=>{
        let d=snap&&snap.exists?snap.data():null;
        if(!d||!d.lots){if(!fbSeeded){fbSeeded=true;seed();try{await fbDataRef.set({lots:state.lots,batches:state.batches,disposals:state.disposals});}catch(e){}}return;}
        state=migrate(d);buildUI();render();if(firstSnap){makeIcons();firstSnap=false;}
      },async err=>{console.error('Firebase',err);if(!uiBuilt)await fallbackInit();});
      setTimeout(()=>{if(!uiBuilt)fallbackInit();},6000);
    }else{
      await fallbackInit();
    }
  }
  init();
})();
</script>
